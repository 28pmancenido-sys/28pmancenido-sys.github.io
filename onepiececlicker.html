<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Clicker</title>
</head>
<style>
    
    body {
        display: grid;
        justify-content: center;
        align-items: center;
        background-image: url(1633216.jpg);
    }

    #score {
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        color: burlywood;
        padding-left: 40%;
    }

    button {
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        font-size: 100%;
        border-radius: 25%;
    }
</style>

<body>
    <img src="apple-touch-icon.png" alt="StrawHat" width="400" id="cookie" onclick="cookieClick()">
    <div id="score">0</div>
    <button id="autoButton" onclick="autoClickUpgrade()"> Upgrade Autoclick (100 clicks) </button>
    <button id="multiButton" onclick="clickMultiUpgrade()"> Upgrade Click Multiplier (100 clicks)</button>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="/GetToSchool7//index.html">Get To School</a></li>
            <li><a href="onepiececlicker.html">Straw Hat Clicker</a></li>
            <li><a href="aboutme.html">Everything About Me</a></li>
        </ul>
    </nav>


</body>
<script>
    //configuration
    //Autoclick
    var autoclickAmount = 0;
    var autoclickCostPerLevel = 100;
    var autoclickCost = 100;



    //clickMulti
    var clickMulti = 1;
    var clickMultiCostPerLevel = 100;
    var clickMultiCost = 100;




    var score = 0;
    var scoreBox = document.getElementById("score");
    var autoButton = document.getElementById("autoButton");
    var multiButton = document.getElementById("multiButton");

    function cookieClick() {
        score = score + (1 * clickMulti);
        scoreBox.innerHTML = score;
        saveGame();


    }
    function autoClickUpgrade() {
        if (score >= autoclickCost) {
            score = score - autoclickCost;
            autoclickAmount = autoclickAmount + 1;
            autoclickCost = autoclickCost + autoclickCostPerLevel;
            autoButton.innerHTML = "Upgrade Auto-Click(" + autoclickCost + "clicks)";
            scoreBox.innerHTML = score;
            saveGame();

        }
    }
    function clickMultiUpgrade() {
        if (score >= clickMultiCost) {
            score = score - clickMultiCost;
            clickMulti = clickMulti + 1;
            clickMultiCost = clickMultiCost + clickMultiCostPerLevel;
            multiButton.innerHTML = "Upgrade Click Multiplier(" + clickMultiCost + "clicks)";
            scoreBox.innerHTML = score;
            saveGame();


        }
    }

    function autoClick() {
        score = score + (1 * autoclickAmount);
        scoreBox.innerHTML = score;
        saveGame();
    }

    function saveGame() {
        var saveData = {
            //Autoclick
            autoclickAmount: autoclickAmount,
            autoclickCostPerLevel: autoclickCostPerLevel,
            autoclickCost: autoclickCost,

            //clickMulti
            clickMulti: clickMulti,
            clickMultiCostPerLevel: clickMultiCostPerLevel,
            clickMultiCost: clickMultiCost,

            score: score,
        }
        var saveText = JSON.stringify(saveData);
        console.log(saveText)
        document.cookie = saveText;
    }

    function loadGame() {
        var cookieText = document.cookie;

        cookieText = JSON.parse(cookieText);

        autoclickAmount = cookieText.autoclickAmount
        autoclickCostPerLevel = cookieText.autoclickCostPerLevel
        autoclickCost = cookieText.autoclickCost
        clickMulti = cookieText.clickMulti;
        clickMultiCostPerLevel = cookieText.clickMultiCostPerLevel;
        clickMultiCost = cookieText.clickMultiCost
        score = cookieText.score;
        autoButton.innerHTML = "Upgrade Auto-Click(" + autoclickCost + "clicks)";
        multiButton.innerHTML = "Upgrade Click Multiplier(" + clickMultiCost + "clicks)";
        scoreBox.innerHTML = score;
        scoreBox.innerHTML = score;
    }
    setInterval(autoClick, 250);

    loadGame();


</script>

</html>
